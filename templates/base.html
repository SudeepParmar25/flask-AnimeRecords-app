<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock title %} - Anime Records</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    


</head>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


  
<body >


    

    <nav class="navbar navbar-expand-lg bg-body-tertiary py-1">
        <div class="container-fluid">
            <!-- Logo section -->
            <a class="navbar-brand" href="/">
                <img id="navbarLogo" src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="Logo"
                    style="width: 40px; height: 40px; margin-right: 10px; display: block; border-radius: 50%;">
            </a>
    
            <!-- Divider between logo and menu -->
            <div class="vr mx-2"></div>
    
            <!-- Toggler button for mobile view -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <!-- Navbar Menu -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-center">
                    <!-- Home -->
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">🏠Home</a>
                    </li>
    
                    <div class="vr mx-2"></div>
    
                    <!-- About -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('about') }}">🗒️About</a>
                    </li>
                    {% if request.endpoint != 'about' %}
    
                    <div class="vr mx-2"></div>
    
                    <!-- Dropdown for Where to Watch -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">🎬Where to Watch (Official)</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="https://www.crunchyroll.com/" target="_blank">
                                    <img src="{{ url_for('static', filename='images/crunchyroll.png') }}" alt="Crunchyroll"
                                        style="width: 30px; height: 30px; margin-right: 5px;">Crunchyroll</a></li>
                            <li><a class="dropdown-item" href="https://www.netflix.com/browse/genre/7424" target="_blank">
                                    <img src="{{ url_for('static', filename='images/netflix.png') }}" alt="Netflix"
                                        style="width: 30px; height: 30px; margin-right: 5px;">Netflix Anime</a></li>
                            <li><a class="dropdown-item" href="https://mangaplus.shueisha.co.jp/updates" target="_blank">
                                    <img src="{{ url_for('static', filename='images/mangaplus.png') }}" alt="MangaPlus"
                                        style="width: 30px; height: 30px; margin-right: 5px;">MangaPlus</a></li>
                        </ul>
                    </li>
                    {% endif %}  
                </ul>
    
                <!-- Dark Mode Toggle Button -->
                <button class="btn btn-dark dark-toggle-btn" id="darkModeToggle">🌓 Dark Mode</button>
                {% if request.endpoint != 'about' and request.endpoint != 'update'  %}
                <!-- Search Form -->
                <form class="d-flex ms-3" role="search" action="/search" method="GET">
                    <input class="form-control me-2" type="search" name="query" placeholder="Search" aria-label="Search">
                    <button class="btn btn-dark" type="submit">Search</button>
                </form>
                {% endif %} 
            </div>
        </div>
    </nav>
    

    <script>
        document.getElementById('darkModeToggle').addEventListener('click', function () {
    // Toggle dark mode on body
    document.body.classList.toggle('dark-mode');

    // Change logos based on dark mode
    const navbarLogo = document.getElementById('navbarLogo');
    const formLogo = document.querySelector('.logo');  // Target the logo above the form
    const button = document.getElementById('darkModeToggle');  // Target the dark mode button
    
    // If dark mode is enabled
    if (document.body.classList.contains('dark-mode')) {
        navbarLogo.src = "{{ url_for('static', filename='images/logowhite.jpeg') }}";  // Dark mode navbar logo
        formLogo.src = "{{ url_for('static', filename='images/logowhite.jpeg') }}";  // Dark mode logo above the form
        button.textContent = "🌕 Light Mode";  // Change button text to Light Mode
        localStorage.setItem('darkMode', 'enabled');
    } else {
        navbarLogo.src = "{{ url_for('static', filename='images/logo.jpeg') }}";  // Light mode navbar logo
        formLogo.src = "{{ url_for('static', filename='images/logo.jpeg') }}";  // Light mode logo above the form
        button.textContent = "🌓 Dark Mode";  // Change button text to Dark Mode
        localStorage.setItem('darkMode', 'disabled');
    }
});


window.addEventListener('load', function () {
    const navbarLogo = document.getElementById('navbarLogo');
    const formLogo = document.querySelector('.logo');
    const button = document.getElementById('darkModeToggle');
    
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
        navbarLogo.src = "{{ url_for('static', filename='images/logowhite.jpeg') }}";  
        formLogo.src = "{{ url_for('static', filename='images/logowhite.jpeg') }}";  
        button.textContent = "🌕 Light Mode";  
    }
});

window.addEventListener('load', function() {
  document.body.classList.add('loaded');
});



      </script>
      
    

    {% block body %}

    {% endblock body %}
    
</body>

</html>
